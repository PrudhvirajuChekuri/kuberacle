name: rag-evaluation

on:
  pull_request:
    paths:
      - "src/**"
      - "configs/**"
      - "evals/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_LOCATION: ${{ secrets.GCP_LOCATION }}

jobs:
  quality-gate-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Authenticate after install so cloud credentials are not present in the
      # environment during dependency build/install.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Pull vector index from GCS
        run: |
          python -m kuberacle pull-index \
            --bucket ${{ secrets.GCS_INDEX_BUCKET }}

      - name: Run smoke evaluation gate
        run: |
          python -m kuberacle evaluate \
            --dataset evals/golden/smoke.jsonl \
            --mode deterministic \
            --json-out artifacts/evals/ci-smoke-eval.json \
            --md-out artifacts/evals/ci-smoke-eval.md

      - name: Upload smoke evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-artifacts-smoke
          path: artifacts/evals/

  quality-gate-full:
    # Manual full rebuild + eval-gated publish, sharing the scheduled path.
    if: github.event_name == 'workflow_dispatch'
    # A reusable workflow can only use permissions the caller grants; the build
    # job needs id-token: write for WIF, so grant it here.
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-index-build.yml
    secrets: inherit
