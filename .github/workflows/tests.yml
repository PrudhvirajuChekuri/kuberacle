name: tests

on:
  push:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  audit-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit pinned dependencies
        run: |
          python -m pip install --upgrade pip pip-audit

          # Security triage: 2026-06-15
          # These advisories currently have no patched versions available upstream.
          #
          # CVE-2026-45829 / chromadb:
          #   Not reachable in this deployment. The advisory targets the ChromaDB
          #   Python FastAPI server collection-creation path. We use Chroma as an
          #   embedded local persistent client and do not run or expose the Chroma
          #   HTTP server.
          #
          # CVE-2026-6587 / ragas:
          #   Not reachable in production. RAGAS is eval-only, not included in the
          #   deployed API image, and runs offline against trusted golden datasets.
          #
          # CVE-2025-69872 / diskcache:
          #   Not remotely reachable in this deployment. Exploitation requires write
          #   access to the local cache directory; public users cannot write files
          #   inside the API container/cache path.

          pip-audit -r requirements.lock \
            --ignore-vuln CVE-2026-45829 \
            --ignore-vuln CVE-2026-6587 \
            --ignore-vuln CVE-2025-69872

  audit-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
