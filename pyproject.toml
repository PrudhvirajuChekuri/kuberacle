[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "k8s-docs-rag"
version = "0.1.0"
description = "Production-grade RAG system for Kubernetes documentation"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    "google-genai",
    "google-auth",
    "google-cloud-storage",
    "requests",
    "python-dotenv",
    "chromadb",
    "rank-bm25",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]
eval = [
    "datasets",
    "ragas",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
