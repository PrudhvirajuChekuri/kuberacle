models:
  embedding: "gemini-embedding-001"
  generation: "gemini-2.5-flash-lite"

embedding:
  output_dimensionality: 768

vector_store:
  collection_name: "k8s_docs_chunks_gemini"
  persist_directory: "data/vector/chroma_gemini"

retrieval:
  semantic_top_k: 10
  lexical_top_k: 10
  merged_top_k: 20
  final_top_k: 5
  hybrid_weight_semantic: 0.6
  hybrid_weight_lexical: 0.4
  min_evidence_score: 0.3
  min_supporting_chunks: 1

reranker:
  enabled: true
  ranking_config: "default_ranking_config"
  model: "semantic-ranker-default@latest"

citation:
  strict_used_only: true
  deduplicate: true

gate:
  enabled: true
  model: "gemini-2.5-flash-lite"

prompts:
  version: "v2"
  directory: "configs/prompts"

generation:
  temperature: 0.2
  max_tokens: 600

# Per-query prices used to estimate spend in the observability layer (USD).
# Verified 2026-06-15 from official Google pricing (Vertex AI standard tier):
#   generation (gemini-2.5-flash-lite): https://cloud.google.com/vertex-ai/generative-ai/pricing
#   embedding (gemini-embedding-001):   https://ai.google.dev/gemini-api/docs/pricing
#   reranker (Discovery Engine):        https://cloud.google.com/generative-ai-app-builder/pricing
# Prices change over time; update them here rather than hard-coding in code.
pricing:
  generation_input_per_1m_usd: 0.10
  generation_output_per_1m_usd: 0.40
  embedding_input_per_1m_usd: 0.15
  reranker_per_1k_queries_usd: 1.00

# Logging and tracing behavior for the serving layer. Secrets and the master
# on/off switch are env-driven (see observability/settings.py); these are the
# non-secret runtime knobs and stay in the single config source of truth.
observability:
  service_name: "kuberacle-api"
  logging:
    level: "INFO"
    format: "json"
  tracing:
    sample_ratio: 1.0

evaluation:
  dataset_path: "evals/golden/v2.jsonl"
  retrieval_recall_at_k_threshold: 0.90
  mrr_threshold: 0.90
  abstention_accuracy_threshold: 0.90
  non_empty_answer_rate_threshold: 0.90
  faithfulness_threshold: 0.90
  faithfulness_judge_model: "gemini-2.5-flash"
  faithfulness_min_parsed: 10
  context_precision_threshold: 0.85
  context_precision_judge_model: "gemini-2.5-flash"
  context_precision_min_parsed: 10
  answer_relevancy_threshold: 0.80
  answer_relevancy_judge_model: "gemini-2.5-flash"
  answer_relevancy_embedding_model: "gemini-embedding-001"
  answer_relevancy_min_parsed: 10
